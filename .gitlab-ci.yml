# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# Pip's cache doesn't store the python packages
# https://pip.pypa.io/en/stable/topics/caching/
#
# If you want to also cache the installed packages, you have to install
# them in a virtualenv and cache it as well.
cache:
  paths:
    - .cache/pip

stages:
  - test
  - extra

.nox:
  tags:
    - docker
  before_script:
    - apt-get update
    - apt-get install --yes --no-install-recommends libcfitsio-dev source-extractor
    - pip install -U virtualenv
    - virtualenv venv
    - source venv/bin/activate
    - pip install -U nox

py311:
  extends:
    - .nox
  image: python:3.11
  stage: test
  script:
    - nox -s coverage

py312:
  extends:
    - .nox
  image: python:3.12
  stage: test
  script:
    - nox -s coverage

py313:
  extends:
    - .nox
  image: python:3.13
  stage: test
  script:
    - nox -s coverage -- --run-slow

py314:
  extends:
    - .nox
  image: python:3.14
  stage: test
  script:
    - nox -s coverage -- --remote-data=any

pre:
  extends:
    - .nox
  image: python:3.14
  stage: extra
  allow_failure: true
  script:
    - PIP_PRE=1 nox -s coverage

docs:
  extends:
    - .nox
  image: python:3.14
  stage: extra
  script:
    - apt-get update
    - apt-get install --yes --no-install-recommends graphviz
    - nox -s docs
  artifacts:
    when: always
    paths:
     - doc/build/html
