name: Run unit tests

on:
  pull_request:
  push:
    branches:
    - master
    tags:
  workflow_dispatch:
  schedule:
    # Run every Sunday at 03:53 UTC
    - cron: 13 3 * * 0

jobs:
  tests:
    name: ${{ matrix.tox_env }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: '3.11'
            tox_env: 'py311'
          - python-version: '3.12'
            tox_env: 'py312'
          - python-version: '3.13'
            tox_env: 'py313'
            tox_args: '-sv --run-slow'
          - python-version: '3.14'
            tox_env: 'py314'
            tox_args: '--remote-data=any'

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install SExtractor
      run: |
        sudo apt update
        sudo apt-get install source-extractor
    - name: Install Tox
      run: python -m pip install tox coverage
    - name: Run Tox
      run: tox -e ${{ matrix.tox_env }} -- --pyargs mpdaf ${{ matrix.tox_args }}
    - name: Convert coverage
      run: python -m coverage xml
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        fail_ci_if_error: true
        token: ${{ secrets.CODECOV_TOKEN }}
